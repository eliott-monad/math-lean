name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: sorry-free gate
        run: |
          # Math/ must never contain a real sorry / admit. candidates/ is exempt.
          # Strip Lean comments first so prose mentions ("keep this `sorry`-free") don't trip it.
          python3 - <<'PY'
          import re, sys, pathlib
          bad = []
          for f in sorted(pathlib.Path("Math").rglob("*.lean")):
              src = f.read_text()
              src = re.sub(r"/-.*?-/", "", src, flags=re.S)   # block comments
              src = re.sub(r"--[^\n]*", "", src)               # line comments
              for i, line in enumerate(src.splitlines(), 1):
                  if re.search(r"\b(sorry|admit)\b", line):
                      bad.append(f"{f}:{i}: {line.strip()}")
          if bad:
              print("::error::found sorry/admit in Math/ (comments excluded):")
              print("\n".join(bad)); sys.exit(1)
          print("sorry-free gate passed")
          PY

      - name: install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: fetch Mathlib cache
        run: lake exe cache get

      - name: build
        run: lake build
